name: daily-data-update

on:
  schedule:
    - cron: "30 22 * * 1-5"   # 평일 22:30 UTC = 한국 오전 7:30
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 섹터 ETF 데이터 갱신
        run: python3 fetch_data.py

      - name: 메가캡 시세 갱신
        run: python3 fetch_megacap.py

      - name: 변경 시 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/megacap.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: $(TZ=Asia/Seoul date +%Y-%m-%d) 갱신"
            git push
          fi
