name: daily-data-update

on:
  schedule:
    - cron: "0 11 * * 1-5"   # 평일 11:00 UTC = 한국 오후 8:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 섹터 ETF 데이터 갱신
        run: python3 fetch_data.py

      - name: 메가캡 시세 갱신
        run: python3 fetch_megacap.py

      - name: 메가캡 재무(매출·영업이익) 갱신
        run: python3 fetch_financials.py || echo "재무 갱신 실패 — 기존 데이터 유지"

      - name: 실적 캘린더(발표일·컨센서스·EPS 서프라이즈) 갱신
        run: python3 fetch_earnings_calendar.py || echo "실적 캘린더 갱신 실패 — 기존 데이터 유지"

      - name: 공포·탐욕 지수 + 매크로 지표 갱신
        run: python3 fetch_macro.py || echo "매크로 갱신 실패 — 기존 데이터 유지"

      - name: 변경 시 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/megacap.json docs/financials.json docs/earnings_calendar.json docs/macro.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: $(TZ=Asia/Seoul date +%Y-%m-%d) 갱신"
            git push
          fi
