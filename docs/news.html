<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>실시간 뉴스 — FLOW·TRACKER</title>
<link rel="stylesheet" href="theme.css?v=20260708b">
<style>
.news-controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 6px 0 16px; }
.news-search { flex: 1; min-width: 200px; max-width: 340px; padding: 9px 13px; font-size: 14px;
  color: var(--text); background: var(--card); border: 1px solid var(--border); border-radius: 9px; outline: none; }
.news-search:focus { border-color: var(--accent); }
.ch-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.ch-chip { background: var(--card); border: 1px solid var(--border); color: var(--muted);
  padding: 6px 13px; border-radius: 999px; font-weight: 700; font-size: 12.5px; cursor: pointer; font-family: inherit; }
.ch-chip.on { color: #fff; border-color: transparent; }
/* 직사각형 카드 그리드 — 최신이 왼쪽 위, 오른쪽으로 흐르며 다음 줄로 밀림 */
.news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(226px, 1fr)); gap: 12px; align-items: start; }
.tg-card { background: var(--card); border: 1px solid var(--border); border-top: 3px solid var(--accent);
  border-radius: 10px; padding: 10px 12px 11px; display: flex; flex-direction: column; height: 188px;
  box-shadow: 0 1px 2px rgba(0,0,0,.18); transition: border-color .12s, transform .12s, box-shadow .12s; }
.tg-card:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(0,0,0,.3); }
.tg-head { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 7px; }
.tg-ch { font-size: 10.5px; font-weight: 800; padding: 2px 8px; border-radius: 999px; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.tg-time { font-family: var(--mono); font-size: 10.5px; color: var(--faint); white-space: nowrap; }
.tg-text { position: relative; flex: 1; font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; overflow: hidden; }
.tg-text::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 26px;
  background: linear-gradient(transparent, var(--card)); pointer-events: none; }
.tg-text a { color: var(--accent); }
.tg-foot { margin-top: 8px; }
.tg-link { font-size: 11px; color: var(--accent); text-decoration: none; font-weight: 700; }
.tg-link:hover { text-decoration: underline; }
.news-empty { border: 1px dashed var(--border-strong); border-radius: 12px; padding: 22px; color: var(--muted); line-height: 1.7; }
.news-empty code { background: var(--card); padding: 1px 6px; border-radius: 5px; font-family: var(--mono); font-size: 12.5px; color: var(--text); }
/* 일일 종합 요약 */
.digest-box { border: 1px solid var(--border); border-top: 3px solid var(--gold); border-radius: 12px;
  background: var(--card); padding: 16px 18px 18px; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.digest-title { font-size: 17px; font-weight: 800; letter-spacing: -.2px; line-height: 1.4; }
.digest-meta { font-size: 11.5px; color: var(--faint); font-family: var(--mono); margin-top: 3px; }
.digest-stats { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 4px; }
.dstat { border: 1px solid var(--border); border-radius: 9px; padding: 7px 12px; background: var(--bg2); min-width: 96px; }
.dstat .dl { font-size: 10.5px; color: var(--muted); }
.dstat .dv { font-size: 15px; font-weight: 800; font-family: var(--mono); margin-top: 2px; }
.dstat .dn2 { font-size: 10px; color: var(--faint); margin-top: 1px; }
.dstat .dv.up { color: var(--up); } .dstat .dv.dn { color: var(--dn); }
.digest-body { margin-top: 8px; }
.digest-body.collapsed { max-height: 300px; overflow: hidden; -webkit-mask-image: linear-gradient(#000 72%, transparent); mask-image: linear-gradient(#000 72%, transparent); }
.digest-body .md h2 { font-size: 15px; font-weight: 800; margin: 16px 0 7px; padding-top: 4px; }
.digest-body .md h3 { font-size: 13.5px; font-weight: 800; margin: 12px 0 5px; color: var(--muted); }
.digest-body .md p { font-size: 13.5px; line-height: 1.72; margin: 6px 0; }
.digest-body .md ul { margin: 5px 0 8px; padding-left: 18px; }
.digest-body .md li { font-size: 13.5px; line-height: 1.62; margin: 3px 0; }
.digest-body .md blockquote, .digest-body .md p em { color: var(--muted); }
.digest-toggle { margin-top: 10px; background: var(--bg2); border: 1px solid var(--border); color: var(--accent);
  border-radius: 8px; padding: 7px 15px; font-size: 12.5px; font-weight: 700; cursor: pointer; font-family: inherit; }
.digest-past { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.digest-past .dp { background: var(--bg2); border: 1px solid var(--border); color: var(--muted);
  padding: 5px 11px; border-radius: 999px; font-size: 11.5px; cursor: pointer; font-family: var(--mono); }
.digest-past .dp.on { color: #fff; background: var(--gold); border-color: transparent; }
</style>
</head>
<body>
<header id="topnav"></header>
<div class="container">
  <div class="kicker">실시간 뉴스 · 텔레그램 수집</div>
  <div class="page-head">
    <h1>실시간 뉴스</h1>
    <span class="upd" id="updated"></span>
  </div>
  <p class="note">
    지정한 텔레그램 채널들의 글을 모아 <b>중복을 제거</b>하고, <b>가장 최신 글이 왼쪽 위</b>에 오도록 카드로 흘려 보여줍니다(오른쪽으로 갈수록 이전 글).
    채널 태그로 걸러 보거나 검색할 수 있고, 각 카드의 <b>원문 ↗</b>을 누르면 텔레그램 원본으로 이동합니다.
  </p>

  <div class="section" id="digest-sec" style="display:none">
    <h2>📰 오늘의 종합 요약<span class="sub">매일 밤 9시 자동 생성 · 섹터·매크로·전체를 한 글로</span></h2>
    <div class="digest-box" id="digest-box"></div>
    <div class="digest-past" id="digest-past"></div>
  </div>

  <div class="section">
    <h2>실시간 피드<span class="sub">최신이 왼쪽 위 · 오른쪽으로 이전 글</span></h2>
    <div class="news-controls">
      <input class="news-search" id="news-search" type="text" placeholder="뉴스 검색 (키워드)">
      <div class="ch-chips" id="ch-chips"></div>
    </div>
    <div id="news-list"><div class="spin">로딩 중…</div></div>
  </div>
</div>

<script src="theme.js?v=20260708c"></script>
<script src="stocks-common.js?v=20260708b"></script>
<script>
var NEWS = [], CHANNELS = [], curCh = "all", kw = "";
var CH_COLORS = ["#3d7eff", "#f0b429", "#34d399", "#c084fc", "#f0475a", "#22d3ee", "#fb923c", "#a3e635"];
function chColor(u) {
  var i = CHANNELS.findIndex(function (c) { return c.username === u; });
  return CH_COLORS[(i < 0 ? 0 : i) % CH_COLORS.length];
}
function pad2(n) { return (n < 10 ? "0" : "") + n; }
function localDateKey(iso) { var d = new Date(iso); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
function fmtTime(iso) {
  var d = new Date(iso);
  return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
}
function fmtDateTime(iso) {
  var d = new Date(iso);
  return pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()) + " " + pad2(d.getHours()) + ":" + pad2(d.getMinutes());
}
var WD = ["일", "월", "화", "수", "목", "금", "토"];
function dateLabel(key) {
  var now = new Date(), t = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var p = key.split("-"), d = new Date(+p[0], +p[1] - 1, +p[2]);
  var diff = Math.round((t - d) / 86400000);
  var base = key + " (" + WD[d.getDay()] + ")";
  if (diff === 0) return "오늘 · " + base;
  if (diff === 1) return "어제 · " + base;
  return base;
}
function linkify(text) {
  return escapeHtml(text).replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function renderChips() {
  var chips = ['<button class="ch-chip' + (curCh === "all" ? " on" : "") + '" data-ch="all"' +
    (curCh === "all" ? ' style="background:var(--accent)"' : "") + ">전체 " + NEWS.length + "</button>"];
  CHANNELS.forEach(function (c) {
    var n = NEWS.filter(function (it) { return it.channel === c.username; }).length;
    var on = curCh === c.username;
    chips.push('<button class="ch-chip' + (on ? " on" : "") + '" data-ch="' + escapeHtml(c.username) + '"' +
      (on ? ' style="background:' + chColor(c.username) + '"' : "") + ">" + escapeHtml(c.title) + " " + n + "</button>");
  });
  $q("#ch-chips").innerHTML = chips.join("");
  $qa("#ch-chips .ch-chip").forEach(function (b) {
    b.onclick = function () { curCh = b.dataset.ch; renderChips(); renderList(); };
  });
}

function renderList() {
  var items = NEWS.filter(function (it) {
    if (curCh !== "all" && it.channel !== curCh) return false;
    if (kw && it.text.toLowerCase().indexOf(kw) < 0) return false;
    return true;
  });
  var host = $q("#news-list");
  if (!items.length) {
    host.innerHTML = '<div class="empty">조건에 맞는 뉴스가 없습니다.</div>';
    return;
  }
  // 최신순(왼쪽 위부터) 직사각형 카드 그리드 — 오른쪽으로 흐르며 다음 줄로 밀림
  host.innerHTML = '<div class="news-grid">' + items.map(function (it) {
    var col = chColor(it.channel);
    return '<div class="tg-card" style="border-top-color:' + col + '">' +
      '<div class="tg-head">' +
        '<span class="tg-ch" style="background:' + col + '">' + escapeHtml(it.channel_title || it.channel) + "</span>" +
        '<span class="tg-time">' + fmtDateTime(it.date) + "</span>" +
      "</div>" +
      '<div class="tg-text">' + linkify(it.text) + "</div>" +
      '<div class="tg-foot"><a class="tg-link" href="' + escapeHtml(it.link) + '" target="_blank" rel="noopener">원문 ↗</a></div>' +
      "</div>";
  }).join("") + "</div>";
}

function showSetup(msg) {
  $q("#news-list").innerHTML = '<div class="news-empty">' + msg + "</div>";
}

$q("#news-search").addEventListener("input", function () { kw = this.value.trim().toLowerCase(); renderList(); });

/* ---------- 일일 종합 요약 ---------- */
var DIGESTS = [], curDigest = 0;
function renderDigest() {
  var d = DIGESTS[curDigest];
  if (!d) return;
  var stats = (d.stats || []).map(function (s) {
    return '<div class="dstat"><div class="dl">' + escapeHtml(s.label) + "</div>" +
      '<div class="dv ' + (s.tone || "") + '">' + escapeHtml(s.value) + "</div>" +
      (s.note ? '<div class="dn2">' + escapeHtml(s.note) + "</div>" : "") + "</div>";
  }).join("");
  $q("#digest-box").innerHTML =
    '<div class="digest-title">' + escapeHtml(d.title || "종합 요약") + "</div>" +
    '<div class="digest-meta">' + escapeHtml(d.generated || d.date || "") + "</div>" +
    (stats ? '<div class="digest-stats">' + stats + "</div>" : "") +
    '<div class="digest-body collapsed" id="digest-body">' + mdRender(d.markdown) + "</div>" +
    '<button class="digest-toggle" id="digest-toggle">전체 보기 ▾</button>';
  $q("#digest-toggle").onclick = function () {
    var col = $q("#digest-body").classList.toggle("collapsed");
    this.textContent = col ? "전체 보기 ▾" : "접기 ▴";
  };
}
function renderDigestPast() {
  if (DIGESTS.length < 2) { $q("#digest-past").innerHTML = ""; return; }
  $q("#digest-past").innerHTML = DIGESTS.map(function (d, i) {
    return '<button class="dp' + (i === curDigest ? " on" : "") + '" data-di="' + i + '">' + escapeHtml(d.date) + "</button>";
  }).join("");
  $qa("#digest-past .dp").forEach(function (b) {
    b.onclick = function () { curDigest = +b.dataset.di; renderDigest(); renderDigestPast(); };
  });
}
fetchJSON("news_digest.json").then(function (d) {
  DIGESTS = (d.digests || []).slice().sort(function (a, b) { return (b.date || "").localeCompare(a.date || ""); });
  if (!DIGESTS.length) return;
  $q("#digest-sec").style.display = "";
  curDigest = 0;
  renderDigest();
  renderDigestPast();
}).catch(function () {});

fetchJSON("telegram_news.json").then(function (d) {
  NEWS = d.items || [];
  CHANNELS = d.channels || [];
  $q("#updated").textContent = "갱신: " + (d.updated || "-") + " · " + NEWS.length + "건 · 채널 " + CHANNELS.length + "개";
  if (!CHANNELS.length) {
    showSetup("아직 등록된 채널이 없습니다.<br>수집할 <b>공개</b> 텔레그램 채널 username을 <code>docs/telegram_channels.json</code>의 <code>channels</code> 배열에 넣으세요(@ 없이). " +
      "예: <code>[\"financialjuice\", \"markettwits\"]</code>.<br><span class=\"muted small\">유료·비공개 방은 로그인이 필요해 이 방식으로는 수집되지 않습니다.</span>");
    renderChips();
    return;
  }
  if (!NEWS.length) {
    showSetup("채널은 등록됐지만 아직 수집된 글이 없습니다. 수집 스크립트(fetch_telegram.py)가 한 번 실행되면 채워집니다.");
  }
  renderChips();
  renderList();
}).catch(function () {
  $q("#updated").textContent = "";
  showSetup("아직 뉴스 데이터가 없습니다.<br>수집할 <b>공개</b> 텔레그램 채널을 <code>docs/telegram_channels.json</code>에 넣고 <code>fetch_telegram.py</code>를 실행하세요. " +
    "채널 목록은 원하시면 저에게 알려주셔도 됩니다.<br><span class=\"muted small\">유료·비공개 방은 로그인이 필요해 이 방식으로는 수집되지 않습니다.</span>");
});
</script>
</body>
</html>
