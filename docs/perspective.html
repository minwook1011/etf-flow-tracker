<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>핵심 테제 트래킹 — FLOW·TRACKER</title>
<link rel="stylesheet" href="theme.css?v=20260706f">
<style>
.krtoggle-wrap { margin-left: auto; }
.th-num { color: var(--accent); font-size: 12.5px; font-weight: 800; font-family: var(--mono); }
.th-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 30px 0 8px; padding-top: 16px; border-top: 1px solid var(--border); }
.th-head h2 { font-size: 19px; font-weight: 800; margin: 0; border: 0; padding: 0; text-transform: none; letter-spacing: -0.3px; }
.th-head h2::before { display: none; }
.th-score { margin-left: auto; font-size: 12px; }
.th-score b { font-size: 18px; font-weight: 800; }
.th-summary {
  font-family: var(--serif); font-size: 15px; line-height: 1.85; color: var(--text);
  border-left: 2px solid var(--accent); padding: 2px 0 8px 16px; margin: 4px 0 12px; max-width: 800px;
}
.kr-label, .rel-label {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase;
  margin: 14px 0 7px; padding-top: 11px; border-top: 1px dashed var(--border-strong);
}
.rel-label .hint { text-transform: none; letter-spacing: 0; opacity: 0.7; font-family: var(--sans); margin-left: 6px; }
.rel-grid { display: grid; gap: 7px; grid-template-columns: repeat(auto-fill, minmax(184px, 1fr)); }
.rel-etf {
  background: var(--card); border: 1px dashed var(--border-strong); border-radius: var(--radius);
  padding: 8px 11px; cursor: pointer;
}
.rel-etf:hover { background: var(--card-hover); border-color: var(--accent); }
.re-top { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
.re-nm { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.re-ret { font-weight: 700; font-size: 12px; font-family: var(--mono); flex-shrink: 0; }
.re-sub { font-size: 10.5px; color: var(--muted); margin-top: 3px; }
.fold-btn {
  background: none; border: 1px solid var(--border); color: var(--accent); cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 7px; margin-top: 14px;
}
.fold-btn:hover { background: var(--card-hover); }
.t-analysis { display: none; margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px; }
.thesis.open .t-analysis { display: block; }
.thesis.open .fold-btn .arrow { transform: rotate(180deg); }
.fold-btn .arrow { display: inline-block; transition: transform .15s; }
.trend-mini { margin-top: 12px; }
.trend-mini .lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-family: var(--mono); }
</style>
</head>
<body>
<header id="topnav"></header>
<div class="container">
  <div class="kicker">주간복기 · 핵심 테제 트래킹</div>
  <div class="page-head">
    <h1>핵심 테제 트래킹</h1>
    <span class="upd" id="updated"></span>
  </div>
  <p class="note">
    주차별 핵심 테제와 관련 종목을 봅니다. 테제 스코어 = 등록일 이후 관련 티커(미국+한국) 평균 수익률.
    <b>종목 카드 클릭 = 등록일 이후 추이 상세, 관련 ETF 카드 클릭 = 일봉 차트 + 구성종목 + 뉴스.</b>
  </p>

  <div class="controls" style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
    <div class="toggle" id="week-tabs"></div>
    <button id="krtoggle" class="krtoggle chip" style="margin-left:auto">한국 종목 보기</button>
  </div>

  <div id="board"><div class="spin">로딩 중…</div></div>
</div>

<script src="theme.js?v=20260706f"></script>
<script src="stocks-common.js?v=20260706f"></script>
<script>
var THESES = null, DATA = null, MEGA = null, META = {}, FIN = {};
var QUOTES = {};
var weeks = [];
var curWeek = 0;
var showKr = false;
try { showKr = !!localStorage.getItem("perspKr"); } catch (e) {}

/* ---------- 수익률 계산 (thesis_quotes 종가 시계열 기반) ---------- */
function baseIdxSince(q, dateStr) {
  for (var i = 0; i < q.dates.length; i++) { if (q.dates[i] >= dateStr) return i; }
  return q.dates.length - 1;
}
function retSince(ticker, dateStr) {
  var q = QUOTES[ticker];
  if (!q || !q.dates || q.dates.length < 2) return null;
  var base = q.closes[baseIdxSince(q, dateStr)];
  if (!base) return null;
  return +((q.closes[q.closes.length - 1] / base - 1) * 100).toFixed(2);
}
function retN(ticker, n) {
  var q = QUOTES[ticker];
  if (!q || !q.closes || q.closes.length < 2) return null;
  var c = q.closes, i = Math.max(0, c.length - 1 - n);
  return c[i] ? +((c[c.length - 1] / c[i] - 1) * 100).toFixed(2) : null;
}
function scoreTrendSeries(tickers, dateStr) {
  var list = tickers.map(function (t) {
    var q = QUOTES[t];
    if (!q || !q.dates || q.dates.length < 2) return null;
    var bi = baseIdxSince(q, dateStr), base = q.closes[bi];
    if (!base) return null;
    var vals = [];
    for (var j = bi; j < q.closes.length; j++) vals.push(((q.closes[j] / base) - 1) * 100);
    return vals;
  }).filter(Boolean);
  if (!list.length) return [];
  var maxLen = Math.max.apply(null, list.map(function (s) { return s.length; }));
  var avg = [];
  for (var k = 0; k < maxLen; k++) {
    var here = list.filter(function (s) { return s.length > k; }).map(function (s) { return s[k]; });
    avg.push(here.reduce(function (a, b) { return a + b; }, 0) / here.length);
  }
  return avg;
}
function resolveName(ticker) {
  if (META[ticker] && META[ticker].name) return META[ticker].name;
  var m = MEGA && MEGA[ticker];
  if (m && m.name) return m.name;
  return ticker;
}

/* ---------- 종목 카드 ---------- */
function tickerCardHTML(ticker, isKr) {
  var q = QUOTES[ticker];
  var name = resolveName(ticker);
  var r1d = q ? q.r1d : null;
  var price = q ? q.price : null;
  var spark = q && q.closes ? q.closes.slice(-30) : [];
  var ccy = isKr ? "₩" : "$";
  var mega = MEGA && MEGA[ticker];
  var sub = mega
    ? '<div class="sc-sub"><span>1주</span> <b class="' + pctClass(mega.r1w) + '">' + fmtPct(mega.r1w, 1) + "</b></div>"
    : "";
  return '<div class="stock-card" data-t="' + escapeHtml(ticker) + '" data-kr="' + (isKr ? "1" : "0") + '">' +
    '<div class="sc-top"><span class="sc-nm">' + escapeHtml(name) + '</span><span class="sc-today ' +
    (r1d == null ? "" : pctClass(r1d)) + '">' + (r1d == null ? "–" : fmtPct(r1d)) + "</span></div>" +
    '<div class="sc-tk">' + escapeHtml(ticker.replace(/\.K[SQ]$/, "")) + (isKr ? " · KR" : " · US") + "</div>" +
    (spark.length > 1 ? sparklineSVG(spark, 130, 30) : '<svg width="130" height="30"></svg>') +
    '<div class="sc-px">' + (price != null ? fmtPrice(price, ccy) : "–") + "</div>" + sub + "</div>";
}
function openThesisTickerModal(ticker, isKr, regDate) {
  var q = QUOTES[ticker];
  var mega = MEGA && MEGA[ticker];
  var name = resolveName(ticker);
  var ccy = isKr ? "₩" : "$";
  if (!q || !q.dates || !q.dates.length) {
    openModal(escapeHtml(name), '<div class="empty">이 티커의 시세 데이터가 아직 없습니다 (다음 자동 갱신 때 수집됩니다)</div>');
    return;
  }
  var since = retSince(ticker, regDate);
  var pctSeries = q.closes.map(function (c) { return (c / q.closes[0] - 1) * 100; });
  var chips = [{ label: "등록(" + regDate + ") 후", value: since == null ? "–" : fmtPct(since), cls: since == null ? "" : pctClass(since) }];
  if (mega) {
    chips.push({ label: "1주", value: fmtPct(mega.r1w), cls: pctClass(mega.r1w) });
    chips.push({ label: "1개월", value: fmtPct(mega.r1m), cls: pctClass(mega.r1m) });
    chips.push({ label: "YTD", value: fmtPct(mega.ytd), cls: pctClass(mega.ytd) });
    chips.push({ label: "52주 고점대비", value: fmtPct(mega.from_high, 1), cls: pctClass(mega.from_high) });
    if (mega.pe_now != null || mega.pe_next != null) {
      chips.push({ label: "선행PER", per: true, cls: "",
        value: (mega.pe_now != null ? "올해 " + mega.pe_now : "") + (mega.pe_now != null && mega.pe_next != null ? " → " : "") + (mega.pe_next != null ? "내년 " + mega.pe_next : "") });
    }
  }
  var chipsHtml = chips.map(function (c) {
    return '<span class="chip' + (c.per ? " per" : "") + '">' + escapeHtml(c.label) + ' <b class="' + c.cls + '">' + escapeHtml(c.value) + "</b></span>";
  }).join("");
  var body = '<div class="modal-chips">' + chipsHtml + "</div>" +
    '<div class="card">' + lineChartSVG([{ name: name, values: pctSeries, color: "#5b8cff" }], 780, 220) + "</div>" +
    '<p class="muted small" style="margin-top:8px">등록일 이전 구간은 6개월 시세 시작점(0%) 기준 누적 수익률입니다.' +
    (mega ? "" : " 메가캡 TOP300 명단에 없어 기간별 상세 통계는 등록일 이후 추이만 제공됩니다.") + "</p>";
  openModal(escapeHtml(name) + ' <span class="muted small">' + escapeHtml(ticker.replace(/\.K[SQ]$/, "")) + (isKr ? " · KR" : " · US") + "</span>" +
    (q.r1d != null ? " " + pctSpan(q.r1d) : ""), body);
  wireLineHover(document.getElementById("modal-back"));
}

/* ---------- 관련 ETF 자동매칭 (테마 키워드 + 보유종목 겹침) ---------- */
var THEMES = [
  ["반도체", ["반도체", "메모리", "HBM", "D램", "낸드", "파운드리", "웨이퍼", "SOCAMM", "PCB", "칩"]],
  ["전력·원자력", ["전력", "변압기", "원자력", "원전", "SMR", "800VDC", "배전", "우라늄"]],
  ["방산", ["방산", "국방", "무기", "항공우주", "방공"]],
  ["AI·로봇", ["AI", "인공지능", "로봇", "에이전틱", "아키텍처", "CPU", "GPU"]]
];
function themesOf(text) {
  var s = text || "";
  var out = [];
  THEMES.forEach(function (t) { if (t[1].some(function (kw) { return s.indexOf(kw) >= 0; })) out.push(t[0]); });
  return out;
}
function relatedEtfs(t) {
  if (!DATA || !DATA.etfs) return [];
  var shown = {};
  (t.tickers || []).concat(t.kr || []).forEach(function (tk) { shown[tk] = 1; });
  var th = themesOf((t.title || "") + " " + (t.summary || ""));
  var out = [];
  Object.keys(DATA.etfs).forEach(function (tk) {
    if (shown[tk] || tk === DATA.benchmark) return;
    var e = DATA.etfs[tk];
    var holds = (e.holdings || []).map(function (h) { return h.ticker; });
    var overlap = (t.tickers || []).filter(function (x) { return holds.indexOf(x) >= 0; });
    var eThemes = themesOf(e.name || "");
    var themed = th.some(function (x) { return eThemes.indexOf(x) >= 0; });
    var score = overlap.length * 2 + (themed ? 1 : 0);
    if (score > 0) out.push({ e: e, tk: tk, score: score, overlap: overlap, themed: themed });
  });
  return out.sort(function (a, b) {
    return b.score - a.score || b.overlap.length - a.overlap.length;
  }).slice(0, 6);
}
function relatedCardHTML(r) {
  var e = r.e;
  var why = r.overlap.length
    ? "보유 " + r.overlap.slice(0, 2).map(function (tk) { return resolveName(tk); }).join("·") + (r.overlap.length > 2 ? " 외" : "")
    : (r.themed ? "테마 연관" : "");
  return '<div class="rel-etf" data-t="' + escapeHtml(r.tk) + '" title="' + escapeHtml(e.name) + '">' +
    '<div class="re-top"><span class="re-nm">' + escapeHtml(e.name) + '</span><span class="re-ret ' + pctClass(e.r1w) + '">' + fmtPct(e.r1w, 1) + "</span></div>" +
    '<div class="re-sub">' + escapeHtml(e.group) + (why ? " · " + escapeHtml(why) : "") + "</div></div>";
}

/* ---------- 렌더 ---------- */
function renderWeekTabs() {
  $q("#week-tabs").innerHTML = weeks.map(function (w, i) {
    return '<button data-i="' + i + '" class="' + (i === curWeek ? "on" : "") + '">' + escapeHtml(w.week) + "</button>";
  }).join("");
  $qa("#week-tabs button").forEach(function (b) {
    b.onclick = function () { curWeek = +b.dataset.i; renderWeekTabs(); renderBoard(); };
  });
  var kb = $q("#krtoggle");
  kb.className = "krtoggle chip" + (showKr ? " on" : "");
  kb.textContent = "한국 종목 " + (showKr ? "ON" : "보기");
  kb.onclick = function () {
    showKr = !showKr;
    try { localStorage.setItem("perspKr", showKr ? "1" : ""); } catch (e) {}
    renderWeekTabs(); renderBoard();
  };
}

function renderBoard() {
  var w = weeks[curWeek];
  if (!w) { $q("#board").innerHTML = '<div class="empty">등록된 테제가 없습니다 — docs/theses.json에 추가하세요</div>'; return; }
  $q("#board").innerHTML = (w.theses || []).map(function (t, ti) {
    var usCards = (t.tickers || []).map(function (tk) { return tickerCardHTML(tk, false); }).join("");
    var krCards = (t.kr || []).map(function (tk) { return tickerCardHTML(tk, true); }).join("");
    var krBlock = (t.kr || []).length
      ? (showKr
          ? '<div class="kr-label">한국 관련종목</div><div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">' + krCards + "</div>"
          : "")
      : "";
    var rel = relatedEtfs(t);
    var relBlock = rel.length
      ? '<div class="rel-label">관련 ETF <span class="hint">테마·구성종목 자동매칭</span></div><div class="rel-grid">' + rel.map(relatedCardHTML).join("") + "</div>"
      : "";
    var rets = (t.tickers || []).concat(t.kr || []).map(function (tk) { return retSince(tk, w.date); }).filter(function (v) { return v != null; });
    var score = rets.length ? +(rets.reduce(function (a, b) { return a + b; }, 0) / rets.length).toFixed(2) : null;
    var trendSeries = scoreTrendSeries((t.tickers || []).concat(t.kr || []), w.date);
    var trendLast = trendSeries.length ? trendSeries[trendSeries.length - 1] : 0;
    var hasAnalysis = t.analysis && t.analysis.trim();
    var cardId = "th-" + w.week + "-" + ti;
    return '<section class="thesis" id="' + cardId + '">' +
      '<div class="th-head"><span class="th-num">테제 ' + (ti + 1) + "</span><h2>" + escapeHtml(t.title) + "</h2>" +
      '<span class="th-score"><span class="muted">스코어(등록후)</span> <b class="' + (score == null ? "" : pctClass(score)) + '">' +
      (score == null ? "–" : fmtPct(score)) + "</b></span></div>" +
      '<div class="th-summary">' + escapeHtml(t.summary) + "</div>" +
      '<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">' +
      (usCards || '<div class="muted small">매칭 종목 없음</div>') + "</div>" +
      krBlock + relBlock +
      (trendSeries.length > 1
        ? '<div class="trend-mini"><div class="lbl">테제 스코어 추이 (등록일 이후, 관련 티커 평균)</div>' +
          lineChartSVG([{ name: "평균 수익률", values: trendSeries, color: trendLast >= 0 ? "#f0475a" : "#3d7eff" }], 780, 110) + "</div>"
        : "") +
      (hasAnalysis
        ? '<button class="fold-btn" data-card="' + cardId + '">자세히 보기 <span class="arrow">▾</span></button><div class="t-analysis">' + mdRender(t.analysis) + "</div>"
        : "") +
      "</section>";
  }).join("");

  $qa(".stock-card").forEach(function (c) {
    c.onclick = function () { openThesisTickerModal(c.dataset.t, c.dataset.kr === "1", w.date); };
  });
  $qa(".rel-etf").forEach(function (c) {
    c.onclick = function () {
      var e = DATA.etfs[c.dataset.t];
      if (e) openEtfDetailModal(e, c.dataset.t, function (holdTk) {
        var m = MEGA && MEGA[holdTk];
        if (m) openMegaStockModal(holdTk, m, FIN[holdTk]);
        else openModal(escapeHtml(holdTk), '<div class="empty">이 종목은 메가캡 TOP300 명단에 없어 상세 정보가 없습니다.</div>');
      });
    };
  });
  $qa(".fold-btn").forEach(function (b) {
    b.onclick = function () { document.getElementById(b.dataset.card).classList.toggle("open"); };
  });
  $qa(".trend-mini").forEach(function (el) { wireLineHover(el); });
}

function boot(theses, data, mega, fin) {
  THESES = theses; DATA = data; MEGA = {};
  META = (theses && theses.meta) || {};
  QUOTES = (data && data.thesis_quotes) || {};
  FIN = (fin && fin.financials) || {};
  if (mega && mega.stocks) mega.stocks.forEach(function (s) { MEGA[s.ticker] = s; });
  weeks = (theses.weeks || []).slice().sort(function (a, b) { return String(b.date).localeCompare(String(a.date)); });
  curWeek = 0;
  $q("#updated").textContent = "테제 갱신: " + (theses.updated || "-") +
    (data ? " · 시세 기준: " + (data.updated || "-") : " · 시세 없음(스코어 미표시)");
  renderWeekTabs();
  renderBoard();
}

Promise.all([
  fetchJSON("theses.json"),
  fetchJSON("data.json").catch(function () { return null; }),
  fetchJSON("megacap.json").catch(function () { return null; }),
  fetchJSON("financials.json").catch(function () { return null; })
]).then(function (rs) { boot(rs[0], rs[1], rs[2], rs[3]); })
  .catch(function (err) {
    $q("#board").innerHTML = '<div class="empty">theses.json 로드 실패<br><span class="small">' + escapeHtml(err.message) + "</span></div>";
  });
</script>
</body>
</html>
